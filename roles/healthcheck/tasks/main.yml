---
# --- Kiem tra Docker containers ---
- name: Kiem tra MySQL container
  community.docker.docker_container_info:
    name: "{{ mysql_container_name }}"
  register: hc_mysql
  ignore_errors: true
  tags: [healthcheck, healthcheck_containers]
  when: inventory_hostname in groups['db']

- name: Assert MySQL container dang chay
  assert:
    that:
      - hc_mysql.container is defined
      - hc_mysql.container.State.Running == true
    success_msg: "[OK] MySQL container dang chay"
    fail_msg:    "[FAIL] MySQL container KHONG chay!"
  ignore_errors: true
  tags: [healthcheck, healthcheck_containers]
  when: inventory_hostname in groups['db']

- name: Kiem tra Flask container
  community.docker.docker_container_info:
    name: "{{ webapp_container_name }}"
  register: hc_flask
  ignore_errors: true
  tags: [healthcheck, healthcheck_containers]
  when: inventory_hostname in groups['web']

- name: Assert Flask container dang chay
  assert:
    that:
      - hc_flask.container is defined
      - hc_flask.container.State.Running == true
    success_msg: "[OK] Flask container dang chay tren {{ inventory_hostname }}"
    fail_msg:    "[FAIL] Flask container KHONG chay!"
  ignore_errors: true
  tags: [healthcheck, healthcheck_containers]
  when: inventory_hostname in groups['web']

# [NEW] Kiem tra Nginx LB container
- name: Kiem tra Nginx LB container
  community.docker.docker_container_info:
    name: "{{ nginx_container_name }}"
  register: hc_nginx
  ignore_errors: true
  tags: [healthcheck, healthcheck_containers]
  when: inventory_hostname in groups['lb']

- name: Assert Nginx LB dang chay
  assert:
    that:
      - hc_nginx.container is defined
      - hc_nginx.container.State.Running == true
    success_msg: "[OK] Nginx LB dang chay"
    fail_msg:    "[FAIL] Nginx LB KHONG chay!"
  ignore_errors: true
  tags: [healthcheck, healthcheck_containers]
  when: inventory_hostname in groups['lb']

# --- HTTP checks ---
- name: "HTTP check Flask direct (retry {{ healthcheck_retries }} lan)"
  uri:
    url:         "{{ healthcheck_flask_url }}"
    method:      GET
    status_code: 200
    timeout:     "{{ healthcheck_timeout }}"
  register: hc_flask_http
  retries:  "{{ healthcheck_retries }}"
  delay:    "{{ healthcheck_delay }}"
  until:    hc_flask_http.status == 200
  ignore_errors: true
  tags: [healthcheck, healthcheck_http]
  when: inventory_hostname in groups['web']

# [NEW] HTTP check qua LB
- name: "HTTP check qua Nginx LB (port 80)"
  uri:
    url:         "http://{{ ansible_host }}/health"
    method:      GET
    status_code: 200
    timeout:     "{{ healthcheck_timeout }}"
  register: hc_lb_http
  retries:  "{{ healthcheck_retries }}"
  delay:    "{{ healthcheck_delay }}"
  until:    hc_lb_http.status == 200
  ignore_errors: true
  tags: [healthcheck, healthcheck_http]
  when: inventory_hostname in groups['lb']

# --- Kiem tra port MySQL ---
- name: "Kiem tra MySQL port {{ mysql_host_port }} co mo khong"
  wait_for:
    host:    "127.0.0.1"
    port:    "{{ mysql_host_port }}"
    timeout: "{{ healthcheck_timeout }}"
    state:   started
  ignore_errors: true
  tags: [healthcheck, healthcheck_containers]
  when: inventory_hostname in groups['db']

# --- Tong ket ---
- name: Tong ket healthcheck
  debug:
    msg: |
      ========== HEALTH CHECK [{{ inventory_hostname }}] ==========
      {% if inventory_hostname in groups['db'] %}
      MySQL container : {{ 'OK' if (hc_mysql.container is defined and hc_mysql.container.State.Running) else 'FAIL' }}
      MySQL port      : {{ mysql_host_port }}
      {% endif %}
      {% if inventory_hostname in groups['web'] %}
      Flask container : {{ 'OK' if (hc_flask.container is defined and hc_flask.container.State.Running) else 'FAIL' }}
      Flask HTTP      : {{ hc_flask_http.status | default('FAIL') }}
      {% endif %}
      {% if inventory_hostname in groups['lb'] %}
      Nginx LB        : {{ 'OK' if (hc_nginx.container is defined and hc_nginx.container.State.Running) else 'FAIL' }}
      LB HTTP         : {{ hc_lb_http.status | default('FAIL') }}
      {% endif %}
      =============================================================
  tags: [healthcheck]
