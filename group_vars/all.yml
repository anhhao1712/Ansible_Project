network_zones:
  wan:
    interface: eth0
    proto: dhcp
  lan:
    interface: eth1
    ipaddr: 192.168.80.1
    network: 192.168.80.0/24  
    netmask: 255.255.255.0
  guest:
    interface: eth2
    ipaddr: 172.16.10.1
    network: 172.16.10.0/24   
    netmask: 255.255.255.0

firewall_log_level: info