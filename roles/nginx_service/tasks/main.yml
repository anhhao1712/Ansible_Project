---
- name: Pull Nginx Docker image
  community.docker.docker_image:
    name:   "{{ nginx_image }}"
    source: pull
  tags: [nginx, nginx_deploy]

- name: Tao thu muc config Nginx
  file:
    path:  /tmp/nginx_conf
    state: directory
    mode:  '0755'
  tags: [nginx, nginx_deploy]

- name: Xoa config cu de dam bao cap nhat moi
  file:
    path:  /tmp/nginx_conf/default.conf
    state: absent
  tags: [nginx, nginx_config]

# [SUA] Dung template LB thay vi reverse proxy cu
- name: Render Nginx Load Balancer config
  ansible.builtin.template:
    src:  nginx_lb.conf.j2
    dest: /tmp/nginx_conf/default.conf
    mode: '0644'
  tags: [nginx, nginx_config]

- name: Run Nginx container
  community.docker.docker_container:
    name:           "{{ nginx_container_name }}"
    image:          "{{ nginx_image }}"
    state:          started
    restart_policy: always
    ports:
      - "{{ nginx_host_port }}:{{ nginx_container_port }}"
    volumes:
      - /tmp/nginx_conf/default.conf:/etc/nginx/conf.d/default.conf:ro
  notify: restart nginx container
  tags: [nginx, nginx_deploy]

- name: Kiem tra Nginx container status
  community.docker.docker_container_info:
    name: "{{ nginx_container_name }}"
  register: nginx_info
  tags: [nginx, nginx_verify]

- name: In trang thai Nginx LB
  debug:
    msg: "Nginx LB [{{ nginx_container_name }}]: {{ nginx_info.container.State.Status }} | port {{ nginx_host_port }} -> flask_cluster ({{ groups['web'] | join(', ') }})"
  tags: [nginx, nginx_verify]
