---
# Play 1: Test bien group_vars
- name: Test global variables
  hosts: all
  gather_facts: false
  tags: [always]
  tasks:
    - name: Test network zones
      debug:
        var: network_zones
    - name: Test firewall log level
      debug:
        var: firewall_log_level

# Play 2: Deploy MySQL len node2
- name: Deploy MySQL Database Server (node2)
  hosts: db
  become: true
  serial: 1
  vars_files:
    - ../vault/secrets.yml
  roles:
    - { role: docker,   tags: [docker] }
    - { role: mysql,    tags: [mysql] }
    - { role: security, tags: [security] }
  tags: [db, deploy]

# Play 3: Deploy Flask len tat ca web nodes (node1 + node3)
- name: Deploy Flask App (all web nodes)
  hosts: web
  become: true
  serial: 1
  vars_files:
    - ../vault/secrets.yml
  roles:
    - { role: docker,   tags: [docker] }
    - { role: webapp,   tags: [webapp] }
    - { role: security, tags: [security] }
  tags: [web, deploy]

# Play 4: Deploy Nginx LB len node1
- name: Deploy Nginx Load Balancer (node1)
  hosts: lb
  become: true
  vars_files:
    - ../vault/secrets.yml
  roles:
    - { role: nginx_service, tags: [nginx] }
  tags: [lb, deploy]
